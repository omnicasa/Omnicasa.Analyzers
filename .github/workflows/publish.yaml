name: NugetPublish
on:
  push:
    branches:
      - master
jobs:
  publish:
    name: build, pack & publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Generating project version
        uses: EduardSergeev/project-version-action@v6
        with:
            version-file: Omnicasa.Analyzer/Omnicasa.Analyzers.csproj
            version-stub: '65534.65534.65534.65534'

      # Publish
      - name: Pack
        run: dotnet pack -c Release Omnicasa.Analyzer/Omnicasa.Analyzers.csproj -p:Version=${{ env.VERSION }} -o ${{ github.workspace }}/artifacts

      - name: Tag vesion
        run: |
          git tag v${{env.VERSION}}
          git push origin v${{env.VERSION}}

      - name: Publish
        run: dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg" --source 'https://api.nuget.org/v3/index.json' --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
